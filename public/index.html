<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Conflict Analyzer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #fff; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: #2d2d2d; border-left: 4px solid #e74c3c; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
        .file-name { font-weight: bold; color: #e74c3c; font-size: 1.1rem; }
        .mods { color: #aaa; margin-top: 0.5rem; }
        .badge { background: #3498db; color: white; padding: 2px 6px; border-radius: 3px; font-size: 0.8rem; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Mod Conflict Analyzer</h1>
        <p>Detected file overwrites between different modules.</p>
        <div id="results">Loading data...</div>
    </div>

    <script>
        fetch('/api/report')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('results');
                if (!data.conflicts || data.conflicts.length === 0) {
                    container.innerHTML = '<p style="color: #2ecc71;">No conflicts found! Your system is stable.</p>';
                    return;
                }
                
                container.innerHTML = `<h3>Total Conflicts: ${data.totalConflicts}</h3>`;
                data.conflicts.forEach(c => {
                    const modsHtml = c.mods.map(m => `<span class="badge">${m}</span>`).join('');
                    container.innerHTML += `
                        <div class="card">
                            <div class="file-name">${c.file}</div>
                            <div class="mods">Conflicting mods: ${modsHtml}</div>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('results').innerHTML = '<p style="color: red;">Failed to load report. Ensure analysis is complete.</p>';
            });
    </script>
</body>
</html>
